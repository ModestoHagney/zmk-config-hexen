# More power for the radio
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Delay boot for logs
#CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000

# Fetch battery levels from the peripherals (the halves)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n

# sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000 # 15 minutes

# Idle
CONFIG_ZMK_IDLE_TIMEOUT=60000 # 1 minute

# Enable battery monitoring hardware support
CONFIG_ZMK_BATTERY_REPORTING=y

# How often to update the battery level (in seconds)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60